# Configuration for comprehensive model comparison
data:
  n_samples: 2000
  anomaly_rate: 0.08
  include_equipment: true
  include_seasonality: true
  include_trend: true
  random_state: 42

models:
  isolation_forest:
    algorithm: isolation_forest
    contamination: 0.05
    n_estimators: 200
    max_samples: "auto"
    random_state: 42
    
  one_class_svm:
    algorithm: one_class_svm
    kernel: "rbf"
    gamma: "scale"
    nu: 0.1
    
  lof:
    algorithm: lof
    n_neighbors: 20
    contamination: 0.05
    algorithm: "auto"

evaluation:
  metrics: [precision_at_k, aucpr, alert_workload, f1_score, precision, recall, specificity]
  k_values: [10, 25, 50, 100]
  cost_false_positive: 15.0
  cost_false_negative: 150.0

visualization:
  figsize: [15, 10]
  save_plots: true
  plot_format: "png"
  dpi: 300
  create_dashboard: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
